<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking API Test · OE5ITH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700&display=swap');

  :root {
    --bg: #0b0e14;
    --panel: #111620;
    --border: #1e2535;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --green: #39ff8a;
    --red: #ff3d5a;
    --yellow: #ffd166;
    --text: #c8d8e8;
    --muted: #4a5a72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .tag {
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 16px;
    height: calc(100vh - 110px);
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .card-header {
    padding: 10px 14px;
    background: #0d1219;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.red   { background: var(--red);   box-shadow: 0 0 6px var(--red); }

  .card-body { padding: 14px; }

  .endpoint-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 9px 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 6px;
    transition: all 0.15s;
    line-height: 1.5;
  }

  .endpoint-btn:hover { border-color: var(--accent); color: var(--accent); }
  .endpoint-btn.stats-btn:hover { border-color: var(--yellow); color: var(--yellow); }
  .endpoint-btn:last-child { margin-bottom: 0; }

  .endpoint-btn .method { color: var(--accent2); font-weight: 700; font-size: 10px; margin-right: 6px; }
  .endpoint-btn .path { color: #fff; }
  .endpoint-btn .desc { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; padding-left: 30px; }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin: 10px 0 6px;
  }
  .section-label:first-child { margin-top: 0; }

  .param-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .param-row label { color: var(--muted); font-size: 11px; min-width: 50px; }

  input[type=range] { flex: 1; accent-color: var(--accent); }

  .param-val { min-width: 46px; text-align: right; color: var(--accent); font-weight: 600; }

  input[type=text], input[type=number] {
    width: 100%;
    background: #0d1219;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    margin-bottom: 8px;
    outline: none;
  }

  input[type=text]:focus, input[type=number]:focus { border-color: var(--accent); }

  .btn-run {
    width: 100%;
    background: var(--accent);
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    border: none;
    border-radius: 4px;
    padding: 9px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }

  .btn-run:hover { opacity: 0.85; }

  /* Output */
  .output-panel { display: flex; flex-direction: column; gap: 0; overflow: hidden; }

  .output-tabs {
    display: flex;
    background: #0d1219;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
  }

  .tab-btn {
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .output-toolbar {
    background: #0d1219;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  .url-display { color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }

  .status-badge {
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .status-ok   { background: rgba(57,255,138,0.15); color: var(--green); }
  .status-err  { background: rgba(255,61,90,0.15);  color: var(--red); }
  .status-idle { background: rgba(74,90,114,0.2);   color: var(--muted); }

  .output-body {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0 0 6px 6px;
    overflow: auto;
    padding: 16px;
  }

  pre {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
  }

  .j-key  { color: #7ec8e3; }
  .j-str  { color: #c3e88d; }
  .j-num  { color: #f78c6c; }
  .j-bool { color: var(--accent2); }
  .j-null { color: var(--muted); }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

  .chip {
    background: #0d1219;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
  }
  .chip span { color: var(--accent); font-weight: 700; }

  /* Stats table */
  .stats-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .stats-table th {
    text-align: left;
    padding: 6px 10px;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .stats-table td {
    padding: 7px 10px;
    border-bottom: 1px solid #161d29;
    vertical-align: middle;
  }
  .stats-table tr:hover td { background: #0d1219; }
  .stats-table .icao { color: var(--accent); font-weight: 600; }
  .stats-table .reg  { color: var(--yellow); }
  .stats-table .num  { color: #f78c6c; text-align: right; }
  .stats-table .muted { color: var(--muted); }
  .mil-badge {
    display: inline-block;
    background: rgba(255,61,90,0.2);
    color: var(--red);
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .subtab-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .subtab {
    padding: 4px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: #0d1219;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .subtab:hover { color: var(--text); }
  .subtab.active { border-color: var(--yellow); color: var(--yellow); }

  /* Tab content visibility */
  .tab-content { display: none; height: 100%; }
  .tab-content.active { display: block; }
</style>
</head>
<body>

<header>
  <h1>OE5ITH Tracking API</h1>
  <div class="tag">Test Console</div>
  <div id="health-indicator" class="tag" style="border-color:var(--muted);color:var(--muted);">● connecting…</div>
</header>

<div class="grid">

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="card">
      <div class="card-header"><div class="dot" id="dot-health"></div>Endpoints</div>
      <div class="card-body">
        <div class="section-label">Live Data</div>
        <button class="endpoint-btn" onclick="runEndpoint('/api/health')">
          <span class="method">GET</span><span class="path">/api/health</span>
          <span class="desc">Healthcheck + DB status</span>
        </button>
        <button class="endpoint-btn" onclick="runEndpoint('/api/aircraft')">
          <span class="method">GET</span><span class="path">/api/aircraft</span>
          <span class="desc">Alle Flugzeuge (letzte Position)</span>
        </button>
        <button class="endpoint-btn" onclick="runEndpoint('/api/aircraft/'+getIcao()+'/track')">
          <span class="method">GET</span><span class="path">/api/aircraft/{icao}/track</span>
          <span class="desc">Track eines Flugzeugs</span>
        </button>
        <button class="endpoint-btn" onclick="runEndpoint('/api/vessels')">
          <span class="method">GET</span><span class="path">/api/vessels</span>
          <span class="desc">Alle Schiffe (letzte Position)</span>
        </button>
        <button class="endpoint-btn" onclick="runEndpoint('/api/vessels/'+getMmsi()+'/track')">
          <span class="method">GET</span><span class="path">/api/vessels/{mmsi}/track</span>
          <span class="desc">Track eines Schiffes</span>
        </button>

        <div class="section-label" style="margin-top:14px">Statistik</div>
        <button class="endpoint-btn stats-btn" onclick="runStats('aircraft')">
          <span class="method">GET</span><span class="path">/api/stats/aircraft</span>
          <span class="desc">Top Flugzeuge, Flugdauer, unique count</span>
        </button>
        <button class="endpoint-btn stats-btn" onclick="runStats('vessels')">
          <span class="method">GET</span><span class="path">/api/stats/vessels</span>
          <span class="desc">Top Schiffe, Aufenthaltsdauer, unique count</span>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div class="dot"></div>Parameter</div>
      <div class="card-body">
        <div class="param-row">
          <label>hours</label>
          <input type="range" id="hours-slider" min="0.083" max="24" step="0.083" value="1"
                 oninput="document.getElementById('hours-val').textContent=parseFloat(this.value).toFixed(2)+'h'">
          <div class="param-val" id="hours-val">1.00h</div>
        </div>
        <div class="param-row">
          <label>limit</label>
          <input type="range" id="limit-slider" min="5" max="50" step="5" value="20"
                 oninput="document.getElementById('limit-val').textContent=this.value">
          <div class="param-val" id="limit-val">20</div>
        </div>
        <div class="param-row" style="margin-bottom:0">
          <label style="min-width:50px">ICAO</label>
          <input type="text" id="icao-input" placeholder="z.B. 3C6586" style="margin:0;flex:1">
        </div>
        <div style="height:8px"></div>
        <div class="param-row" style="margin-bottom:0">
          <label style="min-width:50px">MMSI</label>
          <input type="text" id="mmsi-input" placeholder="z.B. 244780000" style="margin:0;flex:1">
        </div>
        <div style="height:12px"></div>
        <div class="param-row">
          <label>Base URL</label>
        </div>
        <input type="text" id="base-url" value="http://100.64.0.1:8787">
        <button class="btn-run" onclick="runCustom()">▶ Run Custom URL</button>
      </div>
    </div>

  </div>

  <!-- Output -->
  <div class="output-panel">
    <div class="output-tabs">
      <button class="tab-btn active" onclick="switchTab('raw', this)">Raw JSON</button>
      <button class="tab-btn" onclick="switchTab('stats', this)">Statistik</button>
    </div>
    <div class="output-toolbar">
      <div class="url-display" id="url-display">—</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div id="timing" style="color:var(--muted)"></div>
        <div class="status-badge status-idle" id="status-badge">IDLE</div>
      </div>
    </div>
    <div class="output-body">

      <!-- Raw JSON tab -->
      <div id="tab-raw" class="tab-content active">
        <div class="chips" id="chips-row" style="display:none"></div>
        <pre id="output">// Endpoint auswählen und ausführen…</pre>
      </div>

      <!-- Stats tab -->
      <div id="tab-stats" class="tab-content">
        <div id="stats-view">
          <p style="color:var(--muted)">// Statistik-Endpoint aufrufen um Daten zu laden…</p>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
const BASE    = () => document.getElementById('base-url').value.replace(/\/$/, '');
const hours   = () => parseFloat(document.getElementById('hours-slider').value).toFixed(4);
const limit   = () => document.getElementById('limit-slider').value;
const getIcao = () => document.getElementById('icao-input').value.trim() || 'AABBCC';
const getMmsi = () => document.getElementById('mmsi-input').value.trim() || '000000000';

let lastStatsData = null;
let currentStatsType = 'aircraft';

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

async function runEndpoint(path) {
  const sep = path.includes('?') ? '&' : '?';
  const url = BASE() + path + sep + 'hours=' + hours();
  await fetchAndShow(url);
}

async function runStats(type) {
  currentStatsType = type;
  const url = BASE() + '/api/stats/' + type + '?hours=' + hours() + '&limit=' + limit();
  await fetchAndShow(url, true);
}

async function runCustom() {
  await fetchAndShow(document.getElementById('base-url').value);
}

function syntaxHighlight(json) {
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
    let cls = 'j-num';
    if (/^"/.test(m)) cls = /:$/.test(m) ? 'j-key' : 'j-str';
    else if (/true|false/.test(m)) cls = 'j-bool';
    else if (/null/.test(m)) cls = 'j-null';
    return `<span class="${cls}">${m}</span>`;
  });
}

function showChips(data) {
  const row = document.getElementById('chips-row');
  const chips = [];
  if (data.count         !== undefined) chips.push(`<div class="chip">count <span>${data.count}</span></div>`);
  if (data.hours         !== undefined) chips.push(`<div class="chip">hours <span>${data.hours}</span></div>`);
  if (data.unique_count  !== undefined) chips.push(`<div class="chip">unique <span>${data.unique_count}</span></div>`);
  if (data.aircraft)                    chips.push(`<div class="chip">aircraft <span>${data.aircraft.length}</span></div>`);
  if (data.vessels)                     chips.push(`<div class="chip">vessels <span>${data.vessels.length}</span></div>`);
  if (data.track)                       chips.push(`<div class="chip">track pts <span>${data.track.length}</span></div>`);
  if (data.ac_db_entries !== undefined) chips.push(`<div class="chip">ac_db <span>${data.ac_db_entries.toLocaleString()}</span></div>`);
  if (chips.length) { row.innerHTML = chips.join(''); row.style.display = 'flex'; }
  else row.style.display = 'none';
}

function renderStats(data, type) {
  lastStatsData = data;
  const container = document.getElementById('stats-view');

  const unique = data.unique_count ?? 0;
  const header = `
    <div class="chips" style="margin-bottom:16px">
      <div class="chip">unique ${type} <span>${unique}</span></div>
      <div class="chip">window <span>${data.hours}h</span></div>
    </div>`;

  const subtabs = `
    <div class="subtab-row">
      <button class="subtab active" id="subtab-count"    onclick="switchSubtab('count',this)">Top Sichtungen</button>
      <button class="subtab"        id="subtab-duration" onclick="switchSubtab('duration',this)">Längste Tracks</button>
    </div>`;

  container.innerHTML = header + subtabs +
    `<div id="subtab-count-content">${buildTable(data.top_count, type)}</div>` +
    `<div id="subtab-duration-content" style="display:none">${buildTable(data.top_duration, type)}</div>`;
}

function switchSubtab(name, btn) {
  document.querySelectorAll('.subtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['count','duration'].forEach(n => {
    const el = document.getElementById('subtab-'+n+'-content');
    if (el) el.style.display = n === name ? 'block' : 'none';
  });
}

function buildTable(rows, type) {
  if (!rows || rows.length === 0) return '<p style="color:var(--muted);padding:12px 0">Keine Daten</p>';

  const isAircraft = type === 'aircraft';

  let headers, rowFn;

  if (isAircraft) {
    headers = ['#', 'ICAO', 'Registration', 'Type', 'Operator', 'Sichtungen', 'Dauer (min)', 'Erste', 'Letzte'];
    rowFn = (e, i) => `
      <tr>
        <td class="muted">${i+1}</td>
        <td class="icao">${e.icao}${e.military ? '<span class="mil-badge">MIL</span>' : ''}</td>
        <td class="reg">${e.registration || '—'}</td>
        <td>${e.type || '—'}</td>
        <td class="muted">${e.operator || '—'}</td>
        <td class="num">${e.count.toLocaleString()}</td>
        <td class="num">${e.duration_min ?? '—'}</td>
        <td class="muted">${fmtTime(e.first_seen)}</td>
        <td class="muted">${fmtTime(e.last_seen)}</td>
      </tr>`;
  } else {
    headers = ['#', 'MMSI', 'Name', 'Type', 'Country', 'Sichtungen', 'Dauer (min)', 'Erste', 'Letzte'];
    rowFn = (e, i) => `
      <tr>
        <td class="muted">${i+1}</td>
        <td class="icao">${e.mmsi}</td>
        <td class="reg">${e.name || '—'}</td>
        <td>${e.type || '—'}</td>
        <td class="muted">${e.country || '—'}</td>
        <td class="num">${e.count.toLocaleString()}</td>
        <td class="num">${e.duration_min ?? '—'}</td>
        <td class="muted">${fmtTime(e.first_seen)}</td>
        <td class="muted">${fmtTime(e.last_seen)}</td>
      </tr>`;
  }

  return `<table class="stats-table">
    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(rowFn).join('')}</tbody>
  </table>`;
}

function fmtTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('de-AT', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
  } catch { return iso.slice(11,16); }
}

async function fetchAndShow(url, isStats = false) {
  const out    = document.getElementById('output');
  const badge  = document.getElementById('status-badge');
  const timing = document.getElementById('timing');
  const urlDisp = document.getElementById('url-display');

  urlDisp.textContent = url;
  badge.className = 'status-badge status-idle';
  badge.innerHTML = '<span class="spinner"></span>LOADING';
  out.innerHTML = '// Fetching…';
  document.getElementById('chips-row').style.display = 'none';

  const t0 = performance.now();
  try {
    const res  = await fetch(url);
    const ms   = (performance.now() - t0).toFixed(0);
    timing.textContent = ms + ' ms';
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = null; }

    if (res.ok) {
      badge.className = 'status-badge status-ok';
      badge.textContent = res.status + ' OK';
      if (data) showChips(data);
      if (isStats && data) {
        renderStats(data, currentStatsType);
        // Auto-switch to stats tab
        const statsTabBtn = document.querySelector('.tab-btn:nth-child(2)');
        switchTab('stats', statsTabBtn);
      }
    } else {
      badge.className = 'status-badge status-err';
      badge.textContent = res.status + ' ERR';
    }

    if (data) out.innerHTML = syntaxHighlight(JSON.stringify(data, null, 2));
    else out.textContent = text;

  } catch (e) {
    const ms = (performance.now() - t0).toFixed(0);
    timing.textContent = ms + ' ms';
    badge.className = 'status-badge status-err';
    badge.textContent = 'FAILED';
    out.textContent = '// Fehler: ' + e.message + '\n\n// Läuft der Service?\n// sudo systemctl status tracking-api';
  }
}

async function checkHealth() {
  const dot = document.getElementById('dot-health');
  const ind = document.getElementById('health-indicator');
  try {
    const res = await fetch(BASE() + '/api/health');
    if (res.ok) {
      const d = await res.json();
      dot.className = 'dot green';
      ind.style.borderColor = 'var(--green)';
      ind.style.color = 'var(--green)';
      ind.textContent = '● online' + (d.ac_db_entries ? ` · ${d.ac_db_entries.toLocaleString()} ac` : '');
    } else throw new Error();
  } catch {
    dot.className = 'dot red';
    ind.style.borderColor = 'var(--red)';
    ind.style.color = 'var(--red)';
    ind.textContent = '● offline';
  }
}

checkHealth();
setInterval(checkHealth, 15000);
</script>
</body>
</html>
